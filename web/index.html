<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Black God"/>
<title>Black God</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<meta name="theme-color" content="#050508"/>
<!-- 高端字体 -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --gold:#C9A84C;
  --gold2:#E8C96A;
  --gold-dim:rgba(201,168,76,.12);
  --gold-glow:rgba(201,168,76,.2);
  --bg:#050508;
  --bg2:#0C0C14;
  --bg-card:rgba(255,255,255,.03);
  --bg-card2:rgba(255,255,255,.06);
  --text:#EEEEF3;
  --text-sub:#7A7A88;
  --text-dim:#3A3A48;
  --border:rgba(255,255,255,.06);
  --border-gold:rgba(201,168,76,.2);
  --radius:18px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC',sans-serif;
  overflow:hidden;-webkit-font-smoothing:antialiased
}

/* ── 粒子背景 ── */
#particles{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden
}
.particle{
  position:absolute;width:1px;height:1px;
  background:var(--gold);border-radius:50%;opacity:0;
  animation:drift linear infinite
}
@keyframes drift{
  0%{opacity:0;transform:translateY(100vh) scale(0)}
  10%{opacity:.6}
  90%{opacity:.2}
  100%{opacity:0;transform:translateY(-20px) scale(1.5)}
}

/* ── App Shell ── */
#app{
  display:flex;flex-direction:column;height:100%;
  padding-top:var(--safe-top);position:relative;z-index:1
}

/* ── 顶部导航 ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:56px;flex-shrink:0;
  background:rgba(5,5,8,.85);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-bottom:1px solid var(--border);
}
.topbar-brand{
  display:flex;align-items:center;gap:10px
}
.topbar-logo{
  width:32px;height:32px;border-radius:9px;overflow:hidden;
  border:1px solid var(--border-gold);
  box-shadow:0 0 12px var(--gold-glow)
}
.topbar-logo img{width:100%;height:100%;object-fit:cover}
.topbar-name{
  font-family:'Cinzel',serif;font-size:18px;font-weight:700;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:.08em
}
.topbar-badge{
  font-size:10px;color:var(--text-dim);
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:20px;padding:2px 7px;
  letter-spacing:.04em
}
.topbar-icon{
  width:34px;height:34px;border-radius:50%;
  background:var(--bg-card2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-sub);font-size:14px;
  transition:all .15s
}
.topbar-icon:active{transform:scale(.9);background:var(--gold-dim)}

/* ── 欢迎屏 ── */
#welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px 24px 16px;
  text-align:center;overflow-y:auto
}
.welcome-logo{
  width:88px;height:88px;border-radius:24px;
  border:1.5px solid var(--border-gold);
  box-shadow:0 0 40px var(--gold-glow),0 0 80px rgba(201,168,76,.08);
  overflow:hidden;margin-bottom:24px;
  animation:logoIn .8s cubic-bezier(.34,1.56,.64,1) forwards;
  opacity:0
}
.welcome-logo img{width:100%;height:100%;object-fit:cover}
@keyframes logoIn{
  from{opacity:0;transform:scale(.7) translateY(20px);filter:blur(12px)}
  to{opacity:1;transform:scale(1) translateY(0);filter:blur(0)}
}
.welcome-title{
  font-family:'Cinzel',serif;font-size:26px;font-weight:700;
  background:linear-gradient(135deg,#fff 0%,var(--gold2) 50%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:.06em;margin-bottom:6px;
  animation:textIn .7s .2s ease-out forwards;opacity:0
}
.welcome-sub{
  font-size:13px;color:var(--text-sub);line-height:1.7;
  margin-bottom:32px;letter-spacing:.02em;
  animation:textIn .7s .35s ease-out forwards;opacity:0
}
@keyframes textIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* 金色分隔线 */
.divider{
  width:60px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:0 auto 28px;
  animation:textIn .7s .3s ease-out forwards;opacity:0
}

/* 快捷卡片 */
.quick-grid{
  display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;
  animation:textIn .7s .45s ease-out forwards;opacity:0
}
.qcard{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:16px;padding:14px 16px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all .18s;
  position:relative;overflow:hidden
}
.qcard::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--gold-dim),transparent);
  opacity:0;transition:opacity .18s
}
.qcard:active{transform:scale(.97)}
.qcard:active::before{opacity:1}
.qcard-icon{
  width:40px;height:40px;border-radius:12px;
  background:var(--gold-dim);border:1px solid var(--border-gold);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0
}
.qcard-text strong{
  display:block;font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px
}
.qcard-text span{font-size:12px;color:var(--text-sub)}

/* ── 消息区 ── */
#chatArea{flex:1;display:flex;flex-direction:column;min-height:0;display:none}
#msgs{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px 0 8px;-webkit-overflow-scrolling:touch;
  min-height:0
}
#msgs::-webkit-scrollbar{display:none}

/* 消息行 */
.msg{display:flex;flex-direction:column;padding:0 16px;margin-bottom:6px;
  animation:msgIn .2s cubic-bezier(.34,1.3,.64,1)}
@keyframes msgIn{
  from{opacity:0;transform:translateY(8px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* 用户气泡 */
.msg.user{align-items:flex-end}
.msg.user .row{display:flex;align-items:flex-end;gap:8px;max-width:80%;flex-direction:row-reverse}
.msg.user .bubble{
  background:linear-gradient(145deg,var(--gold2),var(--gold));
  color:#0A0A0F;font-weight:600;
  padding:10px 15px;border-radius:20px 4px 20px 20px;
  font-size:15px;line-height:1.55;word-break:break-word;
  box-shadow:0 4px 16px rgba(201,168,76,.3)
}

/* AI 气泡 */
.msg.ai{align-items:flex-start}
.msg.ai .row{display:flex;align-items:flex-end;gap:10px;max-width:88%}
.ai-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:var(--bg2);border:1.5px solid var(--border-gold);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:13px;box-shadow:0 0 10px var(--gold-glow)
}
.ai-avatar img{width:100%;height:100%;object-fit:cover}
.msg.ai .bubble{
  background:rgba(255,255,255,.04);
  color:var(--text);
  padding:10px 15px;border-radius:4px 20px 20px 20px;
  font-size:15px;line-height:1.6;word-break:break-word;
  border:1px solid var(--border);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 2px 12px rgba(0,0,0,.3)
}

/* 错误 */
.msg.err .bubble{
  background:rgba(255,59,48,.06);border:1px solid rgba(255,59,48,.15);
  color:#FF6B6B;border-radius:12px;font-size:14px;
  padding:10px 14px
}

/* 时间 */
.ts{font-size:11px;color:var(--text-dim);margin-top:3px;padding:0 4px}
.msg.user .ts{text-align:right}

/* 步骤 */
.steps{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.step-tag{font-size:11px;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:3px}
.step-tag.done{background:rgba(52,199,89,.08);color:#34C759;border:1px solid rgba(52,199,89,.15)}
.step-tag.fail{background:rgba(255,59,48,.08);color:#FF6B6B;border:1px solid rgba(255,59,48,.15)}

/* 代码块 */
.msg pre{
  background:#080810;border:1px solid rgba(255,255,255,.07);
  border-radius:10px;padding:12px;overflow-x:auto;margin:8px 0;
  font-family:'SF Mono',Menlo,monospace;font-size:13px;line-height:1.5
}
.msg code{background:rgba(255,255,255,.07);padding:2px 5px;border-radius:4px;font-family:'SF Mono',Menlo,monospace;font-size:13px}
.msg pre code{background:none;padding:0}
.msg strong{color:#fff;font-weight:600}

/* 思考动画 */
.thinking{display:flex;gap:5px;align-items:center;padding:2px 0}
.thinking span{
  width:7px;height:7px;border-radius:50%;
  background:var(--gold);opacity:.5;
  animation:tp 1.2s infinite ease-in-out
}
.thinking span:nth-child(2){animation-delay:.16s}
.thinking span:nth-child(3){animation-delay:.32s}
@keyframes tp{
  0%,80%,100%{transform:scale(.6);opacity:.3}
  40%{transform:scale(1.1);opacity:.9}
}

/* ── 输入栏 ── */
.input-wrap{
  flex-shrink:0;
  background:rgba(5,5,8,.92);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-top:1px solid var(--border);
  padding:10px 16px calc(10px + var(--safe-bot))
}
.input-row{display:flex;align-items:flex-end;gap:10px}
.input-box{
  flex:1;background:rgba(255,255,255,.05);
  border:1.5px solid var(--border);
  border-radius:24px;padding:10px 16px;
  display:flex;align-items:flex-end;gap:8px;
  transition:border-color .18s,box-shadow .18s
}
.input-box:focus-within{
  border-color:var(--border-gold);
  box-shadow:0 0 0 3px var(--gold-dim)
}
#inp{
  flex:1;border:none;outline:none;background:transparent;
  color:var(--text);font-size:16px;line-height:1.5;
  resize:none;max-height:120px;font-family:inherit
}
#inp::placeholder{color:var(--text-dim)}

/* 发送按钮 */
.send-btn{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(145deg,var(--gold2),var(--gold));
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px var(--gold-glow);
  transition:all .15s;position:relative;overflow:hidden
}
.send-btn::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:rgba(255,255,255,.3);transform:scale(0);opacity:0;
  transition:transform .3s,opacity .3s
}
.send-btn:active::after{transform:scale(2);opacity:0;transition:none}
.send-btn:active{transform:scale(.92)}
.send-btn:disabled{opacity:.35;pointer-events:none;box-shadow:none}
.send-btn svg{width:20px;height:20px;fill:#050508}

/* ── Tab 栏 ── */
.tabbar{
  display:flex;flex-shrink:0;
  background:rgba(5,5,8,.92);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bot)
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:10px 0;cursor:pointer;gap:4px
}
.tab-icon{font-size:22px;line-height:1;transition:transform .2s}
.tab-label{font-size:10px;color:var(--text-dim);transition:color .2s;letter-spacing:.03em}
.tab.active .tab-icon{transform:scale(1.15)}
.tab.active .tab-label{color:var(--gold);font-weight:600}

/* ── 记录页 / 我的页 ── */
.inner-page{flex:1;overflow-y:auto;overflow-x:hidden;display:none}
.inner-page::-webkit-scrollbar{display:none}
.page-header{
  padding:20px 16px 12px;
  font-family:'Cinzel',serif;font-size:16px;font-weight:700;
  color:var(--gold);letter-spacing:.06em
}
.glass-card{
  background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin:0 16px 12px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)
}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;opacity:.85}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center}
.stat-num{
  font-size:28px;font-weight:700;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.stat-label{font-size:11px;color:var(--text-sub);margin-top:3px;letter-spacing:.03em}
.task-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 0;border-bottom:1px solid var(--border)
}
.task-item:last-child{border-bottom:none}
.task-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.task-dot.done{background:#34C759;box-shadow:0 0 6px rgba(52,199,89,.5)}
.task-dot.fail{background:#FF6B6B}
.task-dot.run{background:var(--gold);box-shadow:0 0 6px var(--gold-glow)}
.task-text{flex:1;font-size:14px;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.task-time{font-size:11px;color:var(--text-dim);flex-shrink:0}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px}
.info-row:last-child{border-bottom:none}
.info-row .k{color:var(--text-sub)}
.info-row .v{color:var(--text);font-weight:500}
</style>
</head>
<body>

<!-- 粒子背景 -->
<div id="particles"></div>

<div id="app">

  <!-- 顶部导航 -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">
        <img src="/icon-192.png" onerror="this.parentElement.style.background='#1a1a28'"/>
      </div>
      <span class="topbar-name">BLACK GOD</span>
    </div>
    <span class="topbar-badge" id="verBadge">v2.2</span>
    <div class="topbar-icon" onclick="clearChat()" title="清空对话">✕</div>
  </div>

  <!-- 对话页容器 -->
  <div id="chatPage" style="display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0">

    <!-- 欢迎屏 -->
    <div id="welcome" style="display:flex;flex-direction:column;flex:1;align-items:center;justify-content:center;padding:24px 24px 16px;text-align:center;overflow-y:auto">
      <div class="welcome-logo">
        <img src="/icon-192.png" onerror="this.parentElement.style.background='#1a1a28'"/>
      </div>
      <div class="welcome-title">BLACK GOD</div>
      <div class="divider"></div>
      <div class="welcome-sub">懂你生活工作方式的助理<br>不只是聊天，真正把事做完</div>
      <div class="quick-grid">
        <div class="qcard" onclick="quickSend('帮我写一段代码')">
          <div class="qcard-icon">💻</div>
          <div class="qcard-text"><strong>写代码</strong><span>写、调试、优化、解释代码</span></div>
        </div>
        <div class="qcard" onclick="quickSend('帮我搜索一下最新资讯')">
          <div class="qcard-icon">🔍</div>
          <div class="qcard-text"><strong>联网搜索</strong><span>实时查找最新信息</span></div>
        </div>
        <div class="qcard" onclick="quickSend('帮我深度分析这个问题')">
          <div class="qcard-icon">🧠</div>
          <div class="qcard-text"><strong>深度分析</strong><span>复杂问题多步推理</span></div>
        </div>
      </div>
    </div>

    <!-- 消息区 -->
    <div id="msgs" style="display:none;flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 0 8px;-webkit-overflow-scrolling:touch;min-height:0"></div>

    <!-- 输入栏 -->
    <div class="input-wrap">
      <div class="input-row">
        <div class="input-box">
          <textarea id="inp" rows="1" placeholder="问我任何事…"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 记录页 -->
  <div class="inner-page" id="tasksPage">
    <div class="page-header">RECORDS</div>
    <div class="glass-card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div style="text-align:center;padding:14px;background:var(--gold-dim);border-radius:12px;border:1px solid var(--border-gold)">
          <div class="stat-num" id="tTotal">-</div>
          <div class="stat-label">总任务</div>
        </div>
        <div style="text-align:center;padding:14px;background:rgba(52,199,89,.06);border-radius:12px;border:1px solid rgba(52,199,89,.15)">
          <div class="stat-num" style="color:#34C759;-webkit-text-fill-color:#34C759" id="tDone">-</div>
          <div class="stat-label">已完成</div>
        </div>
      </div>
    </div>
    <div class="glass-card">
      <div class="card-title">最近任务</div>
      <div id="taskList"><div style="color:var(--text-dim);font-size:14px;text-align:center;padding:20px">加载中…</div></div>
    </div>
  </div>

  <!-- 我的页 -->
  <div class="inner-page" id="minePage">
    <div class="page-header">PROFILE</div>
    <div class="glass-card">
      <div class="card-title">使用统计</div>
      <div class="stat-grid">
        <div><div class="stat-num" id="mSkills">-</div><div class="stat-label">技能</div></div>
        <div><div class="stat-num" style="-webkit-text-fill-color:#5AC8FA" id="mTasks">-</div><div class="stat-label">任务</div></div>
        <div><div class="stat-num" style="-webkit-text-fill-color:#34C759" id="mMems">-</div><div class="stat-label">记忆</div></div>
      </div>
    </div>
    <div class="glass-card">
      <div class="card-title">用户画像</div>
      <div id="profileCard">
        <div class="info-row"><span class="k">活跃时段</span><span class="v" id="pActive">-</span></div>
        <div class="info-row"><span class="k">对话风格</span><span class="v" id="pStyle">-</span></div>
        <div class="info-row"><span class="k">回复偏好</span><span class="v" id="pReply">-</span></div>
      </div>
    </div>
    <div class="glass-card">
      <div class="card-title">内核版本</div>
      <div>
        <div class="info-row"><span class="k">推理引擎</span><span class="v" style="color:var(--gold)">Claude + Manus + GPT-5.5</span></div>
        <div class="info-row"><span class="k">自进化</span><span class="v" style="color:#34C759">Hermes ✓</span></div>
        <div class="info-row"><span class="k">沙箱</span><span class="v" style="color:#5AC8FA">双层隔离 ✓</span></div>
        <div class="info-row"><span class="k">技能数</span><span class="v" id="mSkills2">-</span></div>
      </div>
    </div>
  </div>

  <!-- Tab 栏 -->
  <div class="tabbar">
    <div class="tab active" id="tab0" onclick="switchTab(0)">
      <div class="tab-icon">💬</div><div class="tab-label">对话</div>
    </div>
    <div class="tab" id="tab1" onclick="switchTab(1)">
      <div class="tab-icon">📋</div><div class="tab-label">记录</div>
    </div>
    <div class="tab" id="tab2" onclick="switchTab(2)">
      <div class="tab-icon">👤</div><div class="tab-label">我的</div>
    </div>
  </div>
</div>

<script>
// ── 粒子生成 ──
(function(){
  const c = document.getElementById('particles');
  for(let i=0;i<18;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${Math.random()*1.5+.5}px;
      height:${Math.random()*1.5+.5}px;
      animation-duration:${Math.random()*15+12}s;
      animation-delay:${Math.random()*10}s;
      opacity:${Math.random()*.4+.1}
    `;
    c.appendChild(p);
  }
})();

// ── 状态 ──
let history=[], busy=false;

// ── 工具 ──
function ts(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function md(t){
  if(!t) return '';
  return t
    .replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/`([^`\n]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}
function friendly(t){
  if(!t) return '';
  if(t.includes('Insufficient Balance')||t.includes('402')) return '服务暂时繁忙，请稍后再试 🔄';
  if(t.includes('503')||t.includes('No available')) return '模型维护中，稍后重试 🔧';
  if(t.includes('执行出错')&&t.includes('{')) return '遇到小问题，换个方式再试试 💡';
  if(t.includes('达到最大步数')) return '任务较复杂，已完成分析，可继续追问 💬';
  return t;
}

// ── 消息渲染 ──
function showMsgs(){
  const w=document.getElementById('welcome');
  const m=document.getElementById('msgs');
  if(w.style.display!=='none'){
    w.style.display='none';
    m.style.display='block';
  }
}
function addMsg(role,content,steps){
  showMsgs();
  const msgs=document.getElementById('msgs');
  const div=document.createElement('div');
  const t=ts();
  const text=friendly(content||'');
  const isErr=(text!==content&&content)||false;

  if(role==='user'){
    div.className='msg user';
    div.innerHTML=`<div class="row"><div class="bubble">${md(text)}</div></div><div class="ts">${t}</div>`;
  } else if(isErr){
    div.className='msg err';
    div.innerHTML=`<div class="row"><div class="ai-avatar"><img src="/icon-192.png" onerror="this.parentElement.textContent='⚡'"></div><div class="bubble">⚠️ ${text}</div></div>`;
  } else {
    let sh='';
    if(steps&&steps.length){
      const done=steps.filter(s=>s.status==='completed'||s.status==='failed');
      if(done.length) sh='<div class="steps">'+done.map(s=>`<span class="step-tag ${s.status==='completed'?'done':'fail'}">${s.status==='completed'?'✓':'✗'} ${s.title}</span>`).join('')+'</div>';
    }
    div.className='msg ai';
    div.innerHTML=`<div class="row"><div class="ai-avatar"><img src="/icon-192.png" onerror="this.parentElement.textContent='⚡'"></div><div><div class="bubble">${md(text)}</div>${sh}</div></div><div class="ts">${t}</div>`;
  }
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}
function showThinking(){
  showMsgs();
  const msgs=document.getElementById('msgs');
  const div=document.createElement('div');
  div.className='msg ai';div.id='thinking';
  div.innerHTML=`<div class="row"><div class="ai-avatar"><img src="/icon-192.png" onerror="this.parentElement.textContent='⚡'"></div><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div></div>`;
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function hideThinking(){const el=document.getElementById('thinking');if(el)el.remove();}

// ── 发送 ──
async function send(){
  if(busy) return;
  const inp=document.getElementById('inp');
  const msg=inp.value.trim();
  if(!msg) return;
  inp.value='';inp.style.height='auto';
  await sendCore(msg);
}
async function quickSend(msg){await sendCore(msg);}
async function sendCore(msg){
  if(busy) return;
  busy=true;
  document.getElementById('sendBtn').disabled=true;
  addMsg('user',msg);
  history.push({role:'user',content:msg});
  showThinking();
  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,history:history.slice(-10),max_steps:3})
    });
    const data=await res.json();
    hideThinking();
    addMsg('assistant',data.answer,data.plan_steps||data.steps);
    history.push({role:'assistant',content:data.answer||''});
  }catch(e){
    hideThinking();
    addMsg('assistant','网络连接失败，请检查网络后重试 📡');
  }
  busy=false;
  document.getElementById('sendBtn').disabled=false;
}
function clearChat(){
  history=[];
  document.getElementById('msgs').innerHTML='';
  document.getElementById('msgs').style.display='none';
  document.getElementById('welcome').style.display='flex';
}

// ── Tab 切换 ──
function switchTab(i){
  const pages=['chatPage','tasksPage','minePage'];
  pages.forEach((id,idx)=>{
    const el=document.getElementById(id);
    if(idx===0){
      el.style.display=i===0?'flex':'none';
    } else {
      el.style.display=i===idx?'flex':'none';
      el.style.flexDirection=i===idx?'column':'';
    }
  });
  [0,1,2].forEach(idx=>{
    document.getElementById('tab'+idx).className='tab'+(idx===i?' active':'');
  });
  if(i===1) loadTasks();
  if(i===2) loadMine();
}

// ── 加载数据 ──
async function loadTasks(){
  try{
    const [s,t]=await Promise.all([
      fetch('/api/stats').then(r=>r.json()),
      fetch('/api/tasks').then(r=>r.json())
    ]);
    document.getElementById('tTotal').textContent=s.tasks?.total||0;
    document.getElementById('tDone').textContent=s.tasks?.completed||0;
    const tasks=(t.tasks||[]).slice(0,20);
    document.getElementById('taskList').innerHTML=tasks.length
      ?tasks.map(t=>{
        const st=t.status==='completed'?'done':t.status==='failed'?'fail':'run';
        const tm=t.created_at?new Date(t.created_at*1000).toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'}):'';
        return `<div class="task-item"><div class="task-dot ${st}"></div><div class="task-text">${t.message||t.title||'任务'}</div><div class="task-time">${tm}</div></div>`;
      }).join('')
      :'<div style="color:var(--text-dim);font-size:14px;text-align:center;padding:20px">暂无任务记录</div>';
  }catch(e){}
}
async function loadMine(){
  try{
    const s=await fetch('/api/stats').then(r=>r.json());
    document.getElementById('mSkills').textContent=s.skills?.total||0;
    document.getElementById('mSkills2').textContent=(s.skills?.total||0)+' 个';
    document.getElementById('mTasks').textContent=s.tasks?.total||0;
    document.getElementById('mMems').textContent=s.memories?.total||0;
    document.getElementById('verBadge').textContent='v'+(s.version||'2.2');
  }catch(e){}
  try{
    const p=await fetch('/api/profile').then(r=>r.json());
    const pr=p.profile||{};
    if(pr.active_period) document.getElementById('pActive').textContent=pr.active_period+'（'+pr.active_hour+'点）';
    if(pr.chat_style) document.getElementById('pStyle').textContent=pr.chat_style;
    if(pr.adaptation?.reply_style) document.getElementById('pReply').textContent=pr.adaptation.reply_style.split('：')[0];
  }catch(e){}
}

// ── 输入框自动扩展 ──
document.getElementById('inp').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
});
document.getElementById('inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});

// ── 初始化 ──
switchTab(0);
</script>
