<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>神枢 · 自主智能体工作台</title>
<style>
  :root{
    --bg:#0a0a0c; --bg2:#111114; --panel:#141418; --panel2:#1a1a20;
    --line:#26262e; --line2:#33333d;
    --gold:#e8c37a; --gold2:#c99b4e; --goldsoft:#f3dca8;
    --txt:#ecebe6; --mut:#8f8f98; --mut2:#6a6a72;
    --ok:#5fd39a; --run:#e8c37a; --err:#e06b6b; --info:#7ab6e8;
    --r:14px; --shadow:0 8px 40px rgba(0,0,0,.45);
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans); background:var(--bg); color:var(--txt);
    -webkit-font-smoothing:antialiased; overflow:hidden;
    background-image:radial-gradient(1200px 600px at 80% -10%, rgba(201,155,78,.10), transparent 60%),
                     radial-gradient(900px 500px at -10% 110%, rgba(201,155,78,.06), transparent 55%);
  }
  .app{display:grid; grid-template-columns:340px 1fr; height:100vh}

  /* ── 侧栏 ── */
  .side{border-right:1px solid var(--line); background:linear-gradient(180deg,var(--bg2),var(--bg));
    display:flex; flex-direction:column; min-height:0}
  .brand{padding:20px 20px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--line)}
  .logo{width:38px;height:38px;border-radius:11px; display:grid; place-items:center; font-weight:800; font-size:20px;
    background:linear-gradient(145deg,var(--gold),var(--gold2)); color:#1a1206;
    box-shadow:0 4px 18px rgba(201,155,78,.35)}
  .brand h1{font-size:15px; letter-spacing:.5px; font-weight:700}
  .brand p{font-size:11px; color:var(--mut); margin-top:2px; letter-spacing:.3px}

  .compose{padding:16px 18px 8px}
  .compose label{font-size:11px; color:var(--mut); text-transform:uppercase; letter-spacing:1px}
  textarea{width:100%; margin-top:8px; background:var(--panel); border:1px solid var(--line2); color:var(--txt);
    border-radius:12px; padding:12px 13px; font-size:14px; font-family:var(--sans); resize:none; min-height:96px;
    line-height:1.5; transition:border .2s}
  textarea:focus{outline:none; border-color:var(--gold2); box-shadow:0 0 0 3px rgba(201,155,78,.12)}
  .run{width:100%; margin-top:10px; padding:12px; border:none; border-radius:12px; cursor:pointer;
    font-size:14px; font-weight:700; letter-spacing:.5px; color:#1a1206;
    background:linear-gradient(145deg,var(--goldsoft),var(--gold2)); transition:.2s; box-shadow:0 4px 16px rgba(201,155,78,.25)}
  .run:hover{filter:brightness(1.05); transform:translateY(-1px)}
  .run:disabled{opacity:.5; cursor:not-allowed; transform:none}

  .examples{padding:6px 18px 14px; display:flex; flex-wrap:wrap; gap:7px}
  .chip{font-size:12px; color:var(--mut); background:var(--panel); border:1px solid var(--line);
    padding:6px 10px; border-radius:20px; cursor:pointer; transition:.15s}
  .chip:hover{color:var(--goldsoft); border-color:var(--gold2)}

  .hist{flex:1; min-height:0; overflow:auto; padding:8px 12px 16px}
  .hist h3{font-size:11px; color:var(--mut2); text-transform:uppercase; letter-spacing:1px; padding:8px 6px 6px}
  .taskitem{padding:11px 12px; border-radius:11px; border:1px solid transparent; cursor:pointer; transition:.15s}
  .taskitem:hover{background:var(--panel); border-color:var(--line)}
  .taskitem .t{font-size:13px; color:var(--txt); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .taskitem .m{font-size:11px; color:var(--mut2); margin-top:3px; display:flex; gap:8px}

  /* ── 主区 ── */
  .main{display:flex; flex-direction:column; min-width:0; min-height:0}
  .topbar{height:56px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:14px;
    padding:0 22px; background:rgba(20,20,24,.55); backdrop-filter:blur(10px)}
  .dot{width:8px;height:8px;border-radius:50%; background:var(--mut2); transition:.3s}
  .dot.on{background:var(--ok); box-shadow:0 0 10px var(--ok)}
  .dot.busy{background:var(--run); box-shadow:0 0 10px var(--run); animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.35}}
  .topbar .title{font-size:14px; font-weight:600}
  .topbar .stat{margin-left:auto; display:flex; gap:18px; font-size:12px; color:var(--mut)}
  .topbar .stat b{color:var(--goldsoft); font-family:var(--mono); font-weight:600}

  .stage{flex:1; min-height:0; overflow:auto; padding:22px 26px 40px}
  .stage::-webkit-scrollbar,.hist::-webkit-scrollbar{width:9px}
  .stage::-webkit-scrollbar-thumb,.hist::-webkit-scrollbar-thumb{background:var(--line2); border-radius:8px}

  .empty{height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--mut2)}
  .empty .big{font-size:52px; opacity:.5}
  .empty p{font-size:14px}

  /* 计划卡 */
  .plan{background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--line2);
    border-radius:var(--r); padding:16px 18px; margin-bottom:18px; box-shadow:var(--shadow)}
  .plan h2{font-size:13px; color:var(--gold); letter-spacing:.5px; margin-bottom:12px; display:flex; align-items:center; gap:8px}
  .step{display:flex; gap:11px; align-items:flex-start; padding:6px 0; font-size:14px; color:var(--mut)}
  .step .num{width:22px;height:22px; flex:0 0 22px; border-radius:50%; border:1.5px solid var(--line2);
    display:grid; place-items:center; font-size:11px; color:var(--mut2); font-family:var(--mono); transition:.3s}
  .step.active .num{border-color:var(--gold); color:var(--gold); box-shadow:0 0 8px rgba(201,155,78,.4)}
  .step.done{color:var(--txt)}
  .step.done .num{background:var(--gold); border-color:var(--gold); color:#1a1206}
  .step.active{color:var(--txt)}
  .deliv-note{margin-top:12px; padding-top:11px; border-top:1px solid var(--line); font-size:12px; color:var(--mut2)}
  .deliv-note b{color:var(--goldsoft)}

  /* 事件时间线 */
  .timeline{position:relative; padding-left:22px}
  .timeline:before{content:""; position:absolute; left:6px; top:6px; bottom:6px; width:2px; background:var(--line)}
  .ev{position:relative; margin-bottom:14px; animation:rise .3s ease}
  @keyframes rise{from{opacity:0; transform:translateY(6px)}to{opacity:1}}
  .ev:before{content:""; position:absolute; left:-19px; top:5px; width:10px;height:10px; border-radius:50%;
    background:var(--panel); border:2px solid var(--line2)}
  .ev.tool:before{border-color:var(--info)} .ev.result:before{border-color:var(--ok)}
  .ev.thought:before{border-color:var(--gold2)} .ev.error:before{border-color:var(--err)}
  .ev .head{display:flex; align-items:center; gap:9px; font-size:12px; color:var(--mut)}
  .ev .tag{font-size:10px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; padding:2px 7px; border-radius:6px}
  .tag.tool{color:var(--info); background:rgba(122,182,232,.12)}
  .tag.result{color:var(--ok); background:rgba(95,211,154,.12)}
  .tag.thought{color:var(--gold); background:rgba(201,155,78,.12)}
  .tag.error{color:var(--err); background:rgba(224,107,107,.12)}
  .ev .body{margin-top:7px; background:var(--panel); border:1px solid var(--line); border-radius:11px;
    padding:11px 13px; font-size:13px; line-height:1.55; color:var(--txt); white-space:pre-wrap; word-break:break-word}
  .ev .body.code{font-family:var(--mono); font-size:12.5px; color:var(--goldsoft); max-height:240px; overflow:auto}
  .ev .body .k{color:var(--mut2)}

  /* 交付物 */
  .deliverable{margin-top:20px; background:linear-gradient(180deg,rgba(201,155,78,.08),var(--panel));
    border:1px solid var(--gold2); border-radius:var(--r); padding:18px 20px; box-shadow:var(--shadow)}
  .deliverable h2{font-size:14px; color:var(--gold); margin-bottom:6px; display:flex; align-items:center; gap:9px}
  .deliverable .meta{font-size:11px; color:var(--mut2); margin-bottom:12px; font-family:var(--mono)}
  .deliverable .content{font-size:14px; line-height:1.7; white-space:pre-wrap; word-break:break-word; color:var(--txt)}
  .deliverable .acts{margin-top:14px; display:flex; gap:9px}
  .btn2{font-size:12px; color:var(--mut); background:var(--panel2); border:1px solid var(--line2);
    padding:7px 13px; border-radius:9px; cursor:pointer; transition:.15s}
  .btn2:hover{color:var(--goldsoft); border-color:var(--gold2)}

  @media (max-width:820px){
    .app{grid-template-columns:1fr}
    .side{position:fixed; inset:0 auto 0 0; width:300px; z-index:20; transform:translateX(-100%); transition:.25s}
    .side.open{transform:none; box-shadow:var(--shadow)}
    .menu{display:grid !important}
  }
  .menu{display:none; width:34px;height:34px; place-items:center; border-radius:9px; border:1px solid var(--line2);
    background:var(--panel); cursor:pointer; color:var(--gold)}
</style>
</head>
<body>
<div class="app">
  <!-- 侧栏 -->
  <aside class="side" id="side">
    <div class="brand">
      <div class="logo">神</div>
      <div><h1>神枢 Nexus</h1><p>自主智能体工作台 · Studio</p></div>
    </div>
    <div class="compose">
      <label>给它一个目标</label>
      <textarea id="goal" placeholder="例如：调研 2026 年边缘 AI 部署方案，产出一页可执行选型建议…"></textarea>
      <button class="run" id="run">▶ 自主执行</button>
    </div>
    <div class="examples" id="examples"></div>
    <div class="hist" id="hist">
      <h3>历史任务</h3>
      <div id="histlist"></div>
    </div>
  </aside>

  <!-- 主区 -->
  <main class="main">
    <div class="topbar">
      <div class="menu" id="menu">☰</div>
      <span class="dot" id="dot"></span>
      <span class="title" id="stateTxt">就绪</span>
      <div class="stat">
        <span>步骤 <b id="sSteps">0</b></span>
        <span>Token <b id="sTok">0</b></span>
        <span>耗时 <b id="sTime">0.0s</b></span>
      </div>
    </div>
    <div class="stage" id="stage">
      <div class="empty" id="empty">
        <div class="big">◆</div>
        <p>输入一个目标，神枢会自己规划、调用工具、逐步执行并交付成果。</p>
      </div>
    </div>
  </main>
</div>

<script>
const $ = s => document.querySelector(s);
const stage = $('#stage'), empty = $('#empty');
const dot = $('#dot'), stateTxt = $('#stateTxt');
const sSteps = $('#sSteps'), sTok = $('#sTok'), sTime = $('#sTime');
let running = false, timer = null, t0 = 0;

const EXAMPLES = [
  '写一个能跑的 Python 素数计算器并自测',
  '调研边缘 AI 部署方案，给一页选型建议',
  '检查本机环境并生成一份系统概况',
  '把一段需求拆成可执行的开发清单',
];
$('#examples').innerHTML = EXAMPLES.map(e=>`<span class="chip">${e}</span>`).join('');
$('#examples').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{ $('#goal').value=c.textContent; $('#goal').focus(); });

$('#menu').onclick = ()=> $('#side').classList.toggle('open');

function setState(mode, txt){
  dot.className = 'dot ' + (mode||'');
  stateTxt.textContent = txt;
}
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

let planSteps = [], curStep = 0, timeline = null, delivEl = null;

function renderPlan(steps, deliverable){
  planSteps = steps; curStep = 0;
  const rows = steps.map((s,i)=>`<div class="step" data-i="${i}"><span class="num">${i+1}</span><span>${esc(s)}</span></div>`).join('');
  const note = deliverable ? `<div class="deliv-note">交付目标：<b>${esc(deliverable)}</b></div>` : '';
  const el = document.createElement('div');
  el.className = 'plan';
  el.innerHTML = `<h2>◇ 执行计划</h2>${rows}${note}`;
  stage.appendChild(el);
  timeline = document.createElement('div');
  timeline.className = 'timeline';
  stage.appendChild(timeline);
}
function advanceStep(){
  const rows = stage.querySelectorAll('.plan .step');
  if(rows[curStep]) rows[curStep].classList.remove('active');
  if(rows[curStep]) rows[curStep].classList.add('done');
  curStep = Math.min(curStep+1, planSteps.length);
  if(rows[curStep]) rows[curStep].classList.add('active');
}
function markActive(){
  const rows = stage.querySelectorAll('.plan .step');
  if(rows[curStep]) rows[curStep].classList.add('active');
}

function addEvent(kind, tag, headExtra, body, isCode){
  const el = document.createElement('div');
  el.className = 'ev ' + kind;
  el.innerHTML = `<div class="head"><span class="tag ${kind}">${tag}</span>${headExtra||''}</div>` +
                 (body ? `<div class="body ${isCode?'code':''}">${body}</div>` : '');
  timeline.appendChild(el);
  stage.scrollTop = stage.scrollHeight;
  return el;
}

function renderDeliverable(content, meta){
  delivEl = document.createElement('div');
  delivEl.className = 'deliverable';
  const m = meta ? `${meta.steps_used||0} 步 · ${meta.usage?.total_tokens||0} token · ${meta.elapsed_sec||0}s` : '';
  delivEl.innerHTML = `<h2>★ 交付物</h2><div class="meta">${m}</div>` +
    `<div class="content">${esc(content)}</div>` +
    `<div class="acts"><button class="btn2" id="cpy">复制</button><button class="btn2" id="dl">下载 .md</button></div>`;
  stage.appendChild(delivEl);
  stage.scrollTop = stage.scrollHeight;
  $('#cpy').onclick = ()=>{ navigator.clipboard.writeText(content); $('#cpy').textContent='已复制'; setTimeout(()=>$('#cpy').textContent='复制',1200); };
  $('#dl').onclick = ()=>{
    const b = new Blob([content],{type:'text/markdown'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(b);
    a.download = 'nexus-deliverable.md'; a.click();
  };
}

async function runGoal(goal){
  if(running || !goal.trim()) return;
  running = true;
  $('#run').disabled = true;
  empty.style.display = 'none';
  stage.innerHTML = '';
  sSteps.textContent='0'; sTok.textContent='0'; sTime.textContent='0.0s';
  setState('busy','规划中…');
  t0 = Date.now();
  timer = setInterval(()=> sTime.textContent = ((Date.now()-t0)/1000).toFixed(1)+'s', 100);

  try{
    const resp = await fetch('/api/agent/stream', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({goal})
    });
    if(!resp.ok || !resp.body) throw new Error('服务不可用 ('+resp.status+')');
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while(true){
      const {value, done} = await reader.read();
      if(done) break;
      buf += dec.decode(value, {stream:true});
      let idx;
      while((idx = buf.indexOf('\n\n')) !== -1){
        const chunk = buf.slice(0, idx); buf = buf.slice(idx+2);
        const line = chunk.split('\n').find(l=>l.startsWith('data:'));
        if(!line) continue;
        try{ handleEvent(JSON.parse(line.slice(5).trim())); }catch(e){}
      }
    }
  }catch(err){
    if(!timeline){ empty.style.display='none'; stage.innerHTML=''; timeline=document.createElement('div'); timeline.className='timeline'; stage.appendChild(timeline); }
    addEvent('error','错误','', esc(err.message));
    setState('','出错');
  }finally{
    running=false; $('#run').disabled=false; clearInterval(timer);
    if(dot.className.includes('busy')) setState('on','完成');
    loadHistory();
  }
}

function handleEvent(ev){
  switch(ev.event){
    case 'task': break;
    case 'plan':
      renderPlan(ev.steps, ev.deliverable); markActive();
      setState('busy','执行中…');
      break;
    case 'thought':
      addEvent('thought','思考','', esc(ev.text));
      break;
    case 'tool_call': {
      sSteps.textContent = ev.step;
      const args = esc(JSON.stringify(ev.args, null, 2));
      addEvent('tool','调用工具', `<span style="color:var(--goldsoft);font-weight:600">${esc(ev.tool)}</span>`, args, true);
      break;
    }
    case 'tool_result':
      addEvent('result','工具结果', `<span class="k">${esc(ev.tool)}</span>`, esc(ev.result), true);
      advanceStep();
      break;
    case 'deliverable':
      window.__deliv = ev.content;
      break;
    case 'done':
      sSteps.textContent = ev.steps_used;
      sTok.textContent = (ev.usage && ev.usage.total_tokens) || 0;
      sTime.textContent = (ev.elapsed_sec||0)+'s';
      stage.querySelectorAll('.plan .step').forEach(s=>s.classList.add('done'));
      renderDeliverable(window.__deliv || '（无交付内容）',
        {steps_used:ev.steps_used, usage:ev.usage, elapsed_sec:ev.elapsed_sec});
      setState('on','完成');
      break;
    case 'error':
      addEvent('error','错误','', esc(ev.message));
      setState('','出错');
      break;
  }
}

$('#run').onclick = ()=> runGoal($('#goal').value);
$('#goal').addEventListener('keydown', e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='Enter') runGoal($('#goal').value); });

async function loadHistory(){
  try{
    const r = await fetch('/api/tasks'); const d = await r.json();
    const list = (d.tasks||[]).slice(0,20);
    $('#histlist').innerHTML = list.map(t=>`
      <div class="taskitem" data-id="${t.id}">
        <div class="t">${esc(t.message||'(无标题)')}</div>
        <div class="m"><span>${t.status||''}</span><span>${(t.created_at||'').slice(5,16).replace('T',' ')}</span></div>
      </div>`).join('') || '<div style="padding:10px;color:var(--mut2);font-size:12px">暂无历史</div>';
    $('#histlist').querySelectorAll('.taskitem').forEach(it=>it.onclick=()=>replay(it.dataset.id));
  }catch(e){}
}

async function replay(id){
  try{
    const r = await fetch('/api/task/'+id); if(!r.ok) return;
    const t = await r.json(); const m = t.meta||{};
    empty.style.display='none'; stage.innerHTML='';
    renderPlan((m.plan&&m.plan.steps)||[], (m.plan&&m.plan.deliverable)||'');
    (m.events||[]).forEach(e=>{
      addEvent('tool','调用工具', `<span style="color:var(--goldsoft);font-weight:600">${esc(e.tool)}</span>`, esc(JSON.stringify(e.args,null,2)), true);
      addEvent('result','工具结果', `<span class="k">${esc(e.tool)}</span>`, esc(e.result||''), true);
    });
    stage.querySelectorAll('.plan .step').forEach(s=>s.classList.add('done'));
    renderDeliverable(t.result||'', {steps_used:(m.events||[]).length, usage:m.usage, elapsed_sec:m.elapsed_sec});
    setState('on','已回放');
    $('#side').classList.remove('open');
  }catch(e){}
}

// 启动
(async()=>{
  try{ const r=await fetch('/api/health'); if(r.ok) setState('on','就绪'); }catch(e){ setState('','离线'); }
  loadHistory();
})();
</script>
</body>
</html>
