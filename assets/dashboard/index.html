<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Black God 控制台</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- 顶部状态栏 -->
  <header class="top-bar">
    <div class="logo">⚫ Black God</div>
    <div class="status-dot" id="globalStatus" title="全局状态">●</div>
    <div class="clock" id="clock">--</div>
  </header>

  <!-- 主动态面板 -->
  <div class="hero-panel" id="heroPanel">
    <div class="hero-left">
      <div class="hero-title">Black God OS</div>
      <div class="hero-sub">云端手机 Agent 控制台 v2.0</div>
    </div>
    <div class="hero-right">
      <div class="hero-stat">
        <div class="hero-stat-num" id="heroUptime">--</div>
        <div class="hero-stat-label">运行时间</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num" id="heroRequests">--</div>
        <div class="hero-stat-label">今日请求</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num" id="heroErrors">--</div>
        <div class="hero-stat-label">错误率</div>
      </div>
    </div>
  </div>

  <!-- 快速入口 -->
  <div class="quick-actions">
    <a class="qa-btn" href="http://8.222.169.202:8765" target="_blank">
      <span class="qa-icon">💬</span>
      <span>Agent 聊天</span>
    </a>
    <a class="qa-btn" href="http://8.222.169.202:8765/showcase" target="_blank">
      <span class="qa-icon">🎯</span>
      <span>能力展示</span>
    </a>
    <a class="qa-btn" href="http://8.222.169.202:8765/?v=os1" target="_blank">
      <span class="qa-icon">🖥️</span>
      <span>OS 控制台</span>
    </a>
    <a class="qa-btn" href="http://8.222.169.202" target="_blank">
      <span class="qa-icon">🌐</span>
      <span>官网入口</span>
    </a>
  </div>

  <!-- 服务健康网格 -->
  <section class="section">
    <h3 class="section-title">🔴 服务健康</h3>
    <div class="health-grid" id="healthGrid">
      <!-- JS 动态填充 -->
    </div>
  </section>

  <!-- 端口 & 入口 -->
  <section class="section">
    <h3 class="section-title">🔗 端口 & 入口</h3>
    <div class="port-table-wrap">
      <table class="port-table">
        <thead>
          <tr><th>端口</th><th>服务</th><th>入口</th><th>状态</th></tr>
        </thead>
        <tbody id="portTableBody">
          <!-- JS 动态填充 -->
        </tbody>
      </table>
    </div>
  </section>

  <!-- 模型池 -->
  <section class="section">
    <h3 class="section-title">🧠 模型池</h3>
    <div class="model-grid" id="modelGrid">
      <!-- JS 动态填充 -->
    </div>
  </section>

  <!-- 记忆 & 技能 -->
  <section class="section">
    <h3 class="section-title">💾 存储状态</h3>
    <div class="storage-grid">
      <div class="storage-card">
        <div class="storage-icon">🧩</div>
        <div class="storage-info">
          <div class="storage-num" id="skillsCount">--</div>
          <div class="storage-label">技能数</div>
        </div>
      </div>
      <div class="storage-card">
        <div class="storage-icon">📝</div>
        <div class="storage-info">
          <div class="storage-num" id="memoriesCount">--</div>
          <div class="storage-label">记忆条数</div>
        </div>
      </div>
      <div class="storage-card">
        <div class="storage-icon">📦</div>
        <div class="storage-info">
          <div class="storage-num" id="appsCount">--</div>
          <div class="storage-label">App 项</div>
        </div>
      </div>
      <div class="storage-card">
        <div class="storage-icon">📋</div>
        <div class="storage-info">
          <div class="storage-num" id="tasksCount">--</div>
          <div class="storage-label">任务数</div>
        </div>
      </div>
    </div>
  </section>

  <!-- 实时日志 -->
  <section class="section">
    <h3 class="section-title">📜 实时日志</h3>
    <div class="log-console" id="logConsole">
      <div class="log-placeholder">正在连接...</div>
    </div>
  </section>

  <!-- 底部操作栏 -->
  <footer class="action-bar">
    <button class="action-btn" onclick="refreshAll()">🔄 刷新全部</button>
    <button class="action-btn" onclick="clearLogs()">🗑️ 清空日志</button>
    <button class="action-btn danger" onclick="restartServices()">⚠️ 重启服务</button>
  </footer>
</div>

<script src="dashboard.js"></script>
</body>
</html>
