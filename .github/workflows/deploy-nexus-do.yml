name: Deploy 神枢 nexus-do

on:
  push:
    paths:
      - 'web/nexus-do/**'
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy nexus-do to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        run: |
          cd web/nexus-do
          wrangler deploy \
            --name nexus-do \
            --compatibility-date 2024-11-01 \
            --compatibility-flags nodejs_compat \
            --route "aquan.lufei.uk/*" \
            --routes "[{\"pattern\":\"aquan.lufei.uk\",\"zone_id\":\"${{ secrets.CF_ZONE_ID }}\"}]"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
