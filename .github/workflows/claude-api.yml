name: Claude Session API
on:
  workflow_dispatch:
jobs:
  run:
    runs-on: macos-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install pynacl
      - name: Run API
        env:
          CLAUDE_KEY: ${{ secrets.CLAUDE_SESSION_KEY }}
        run: |
          cat > api.py << 'PY'
          import os,json,time,uuid,threading,urllib.request,urllib.error
          from http.server import HTTPServer,BaseHTTPRequestHandler
          KEY=os.environ["CLAUDE_KEY"];ORG="15b4f0c6-9543-4aef-bf9b-b655a6a18c05"
          def call(p):
              cid=str(uuid.uuid4())
              h={"Cookie":f"sessionKey={KEY}","Content-Type":"application/json","User-Agent":"Mozilla/5.0"}
              r=urllib.request.Request(f"https://claude.ai/api/organizations/{ORG}/chat_conversations",data=json.dumps({"uuid":cid,"name":"gh"}).encode(),headers=h,method="POST")
              with urllib.request.urlopen(r,15)as rp:cv=json.loads(rp.read())
              r2=urllib.request.Request(f"https://claude.ai/api/organizations/{ORG}/chat_conversations/{cv['uuid']}/completion",data=json.dumps({"prompt":p,"timezone":"Asia/Shanghai","attachments":[],"files":[]}).encode(),headers=h,method="POST")
              t=""
              with urllib.request.urlopen(r2,120)as rp:
                  for l in rp:
                      l=l.decode().strip()
                      if l.startswith("data: "):
                          try:
                              d=json.loads(l[6:])
                              if d.get("completion"):t=d["completion"]
                          except:pass
              return t
          class H(BaseHTTPRequestHandler):
              def log_message(self,*a):pass
              def do_GET(self):
                  if self.path=="/health":self._j({"status":"ok"})
                  elif self.path=="/v1/models":self._j({"object":"list","data":[{"id":"claude-session","object":"model","created":int(time.time())}]})
              def do_POST(self):
                  if self.path=="/v1/chat/completions":
                      try:
                          b=json.loads(self.rfile.read(int(self.headers["Content-Length"])))
                          m=b["messages"][-1]["content"]
                          r=call(m)
                          self._j({"id":f"chatcmpl-{uuid.uuid4().hex[:12]}","object":"chat.completion","created":int(time.time()),"model":"claude-session","choices":[{"index":0,"message":{"role":"assistant","content":r},"finish_reason":"stop"}]})
                      except Exception as e:self._j({"error":str(e)},500)
              def _j(self,d,code=200):
                  self.send_response(code);self.send_header("Content-Type","application/json");self.end_headers()
                  try:self.wfile.write(json.dumps(d).encode())
                  except:pass
          threading.Thread(target=lambda:HTTPServer(("0.0.0.0",8765),H).serve_forever(),daemon=True).start()
          time.sleep(1)
          print("✅ API running on :8765")
          print("Access via ngrok tunnel...")
          import subprocess,sys
          subprocess.run(["curl","-sL","https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-amd64.tgz","-o","ngrok.tgz"],check=True)
          subprocess.run(["tar","xzf","ngrok.tgz"],check=True)
          proc=subprocess.Popen(["./ngrok","http","8765","--log=stdout"],stdout=subprocess.PIPE,stderr=subprocess.STDOUT,text=True)
          for line in proc.stdout:
              print(line.strip())
              if "url=" in line:
                  print("✅ NGrok URL found in log above")
          proc.wait()
          PY
          python3 api.py
