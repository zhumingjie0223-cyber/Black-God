<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--field-bg); font-family: var(--font-sans); padding: 22px; }
  .grid { display: flex; flex-direction: column; gap: 16px; }
  .lbl { font-size: 11px; letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-3); font-weight: 600; }
  .switchrow { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius-sm); }
  .switchrow span { color: var(--text); font-size: 15px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, IconButton, Switch } = window.BlackGodDesignSystem_7a1b36;
  function Demo() {
    const [q, setQ] = React.useState("");
    const [msg, setMsg] = React.useState("");
    const [local, setLocal] = React.useState(true);
    const [cloud, setCloud] = React.useState(false);
    return (
      <div className="grid">
        <span className="lbl">Input</span>
        <Input icon="🔍" placeholder="搜索记忆…" value={q} onChange={e=>setQ(e.target.value)} />
        <Input multiline placeholder="发消息给 Black God…" value={msg} onChange={e=>setMsg(e.target.value)}
               trailing={<IconButton variant="chrome">↑</IconButton>} />
        <span className="lbl">Switch</span>
        <div className="switchrow"><span>🔒 本地优先存储</span><Switch checked={local} onChange={setLocal} /></div>
        <div className="switchrow"><span>☁️ 同步到云端</span><Switch checked={cloud} onChange={setCloud} /></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
