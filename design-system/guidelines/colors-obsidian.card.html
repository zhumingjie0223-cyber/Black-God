<!-- @dsCard group="Colors" viewport="700x150" name="Obsidian Base" subtitle="Cool-toned elevation blacks — app canvas to control fills" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; padding: 20px; }
  .sw { flex: 1; height: 100px; border-radius: var(--radius-sm); border: 1px solid var(--line); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .n { font-size: 12px; color: var(--text); font-weight: 600; }
  .v { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--bg)"><span class="n">bg</span><span class="v">#08090B</span></div>
    <div class="sw" style="background:var(--bg-1)"><span class="n">bg-1</span><span class="v">#0D0F13</span></div>
    <div class="sw" style="background:var(--bg-2)"><span class="n">bg-2</span><span class="v">#13161B</span></div>
    <div class="sw" style="background:var(--bg-3)"><span class="n">bg-3</span><span class="v">#1A1E25</span></div>
  </div>
</body>
</html>
