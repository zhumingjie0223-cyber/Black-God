<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 22px; }
  .hero { font-size: 48px; font-weight: 800; letter-spacing: var(--ls-tight); line-height: 1.05; background: var(--chrome-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .wm { margin-top: 14px; font-size: 22px; font-weight: 700; letter-spacing: var(--ls-brand); background: var(--chrome-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .meta { margin-top: 10px; font-size: 12px; color: var(--text-3); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="hero">真正懂你的助理</div>
  <div class="wm">BLACK&nbsp;&nbsp;GOD</div>
  <div class="meta">--fs-hero 72/clamp · 800 · ls -0.04em &nbsp;·&nbsp; wordmark ls 0.14em</div>
</body>
</html>
