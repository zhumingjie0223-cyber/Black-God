<!-- @dsCard group="Type" viewport="700x230" name="UI Scale" subtitle="System stack — heading to micro, freshly bumped for legibility" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 22px; color: var(--text); }
  .r { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; border-bottom: 1px solid var(--line); }
  .r:last-child { border: none; }
  .lbl { width: 130px; flex: 0 0 auto; font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
</style>
</head>
<body>
  <div class="r"><span class="lbl">h1 · 27 / 700</span><span style="font-size:var(--fs-h1);font-weight:700">记得你的工作生活</span></div>
  <div class="r"><span class="lbl">h2 · 22 / 600</span><span style="font-size:var(--fs-h2);font-weight:600">本地优先，不上传云端</span></div>
  <div class="r"><span class="lbl">h3 · 19 / 600</span><span style="font-size:var(--fs-h3);font-weight:600">成本级联引擎</span></div>
  <div class="r"><span class="lbl">body · 16.5 / 400</span><span style="font-size:var(--fs-body);color:var(--text-2)">把执行权和数据留在你自己手里。</span></div>
  <div class="r"><span class="lbl">caption · 13</span><span style="font-size:var(--fs-cap);color:var(--text-3)">L0 缓存命中 · 0ms · ¥0.00</span></div>
</body>
</html>
