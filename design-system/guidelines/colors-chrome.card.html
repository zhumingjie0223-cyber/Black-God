<!-- @dsCard group="Colors" viewport="700x150" name="Chrome Accent" subtitle="The brand — cold silver, never blue or purple" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; padding: 20px; align-items: stretch; }
  .sw { flex: 1; height: 100px; border-radius: var(--radius-sm); border: 1px solid var(--line); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .n { font-size: 12px; font-weight: 600; }
  .v { font-size: 11px; font-family: var(--font-mono); opacity: .7; }
  .grad { flex: 1.4; background: var(--chrome-grad); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw grad"><span class="n" style="color:#14171C">chrome-grad</span><span class="v" style="color:#14171C">wordmark · buttons</span></div>
    <div class="sw" style="background:var(--chrome-1)"><span class="n" style="color:#14171C">chrome-1</span><span class="v" style="color:#14171C">#C8CED6</span></div>
    <div class="sw" style="background:var(--chrome-2)"><span class="n" style="color:#14171C">chrome-2</span><span class="v" style="color:#14171C">#9AA1AB</span></div>
    <div class="sw" style="background:var(--chrome-3)"><span class="n" style="color:#fff">chrome-3</span><span class="v" style="color:#fff">#6B727C</span></div>
    <div class="sw" style="background:var(--chrome-4)"><span class="n" style="color:#fff">chrome-4</span><span class="v" style="color:#fff">#454B54</span></div>
  </div>
</body>
</html>
